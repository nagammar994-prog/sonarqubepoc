# Project Information
sonar.projectKey=devsecops-poc
sonar.projectName=DevSecOps POC

# Scan the entire repository
sonar.sources=.

# Test configuration
sonar.tests=app/tests
sonar.test.inclusions=app/tests/**/*.js

# Exclude generated and third-party files
sonar.exclusions=\
**/node_modules/**,\
**/coverage/**,\
**/.scannerwork/**,\
**/.git/**,\
**/reports/**

# JavaScript Code Coverage
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Source Encoding
sonar.sourceEncoding=UTF-8

# SCM Provider
sonar.scm.provider=git
